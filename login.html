<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal Login | KFS</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header"></header>

    <div class="content-area">
        <h1>Client Portal</h1>
        <p class="subtitle">Securely manage your "Protected by Excellence" portfolio.</p>

        <div class="calc-container" style="max-width: 450px; flex-direction: column;">
            <div class="input-section" style="min-width: 100%;">
                <div class="input-group">
                    <label>Username / Email</label>
                    <input type="text" placeholder="Enter your credentials">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button class="calc-btn">Login to Dashboard</button>
                
                <p style="margin-top: 20px; font-size: 0.85rem; text-align: center;">
                    <a href="#" style="color: #c5a059; text-decoration: none;">Forgot Password?</a>
                </p>
            </div>
        </div>

        <div style="margin-top: 40px; color: #666; font-size: 0.9rem;">
            <p>New client? <a href="contact.html" style="color: #ffc300; text-decoration: none; font-weight: bold;">Request access here</a></p>
        </div>
    </div>

    <script src="nav.js"></script>
	<script src="footer.js"></script>
</body>
</html>
